version: '3.8'

services:
  goldenrace-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goldenrace-server-dev
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - PORT=3000
    volumes:
      - ./logs:/app/logs
      - ./src:/app/src
      - ./.env:/app/.env
    command: npm run dev
    restart: unless-stopped
    networks:
      - goldenrace-network

  # 개발용 데이터베이스 (선택사항)
  # postgres-dev:
  #   image: postgres:15-alpine
