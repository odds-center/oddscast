services:
  mysql:
    image: mysql:8.0
    container_name: goldenrace-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: goldenrace
      MYSQL_USER: goldenrace_user
      MYSQL_PASSWORD: goldenrace_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - goldenrace-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: goldenrace-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    ports:
      - '8080:80'
    depends_on:
      - mysql
    networks:
      - goldenrace-network

volumes:
  mysql_data:

networks:
  goldenrace-network:
    driver: bridge
