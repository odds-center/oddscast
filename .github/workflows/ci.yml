# CI: lint + build (server, webapp, admin)
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

defaults:
  run:
    working-directory: .

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint server
        run: pnpm --filter server lint

      - name: Lint webapp
        run: pnpm --filter webapp lint

      - name: Lint admin
        run: pnpm --filter oddscast-admin lint

      - name: Build shared
        run: pnpm --filter @oddscast/shared build

      - name: Test server
        run: pnpm --filter server test

      - name: Build server
        run: pnpm --filter server build

      - name: Build webapp
        run: pnpm --filter webapp build

      - name: Build admin
        run: pnpm --filter oddscast-admin build

  e2e:
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @oddscast/shared build

      - name: Build webapp (required for next start in CI)
        run: pnpm --filter webapp build

      - name: Install Playwright browsers
        run: pnpm --filter webapp exec playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm --filter webapp test:e2e -- --project=chromium
        env:
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: webapp/playwright-report/
          retention-days: 7

