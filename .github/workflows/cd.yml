# Deploy workflow for master branch.
# Railway auto-deploys via its own GitHub integration on master push.
# This workflow only handles:
#   1. (Optional) Pre-deploy TypeORM migrations via PROD_DATABASE_URL secret
#   2. Discord notification
#
# Migration strategy:
#   1. (Optional) GitHub Actions runs migrations via PROD_DATABASE_URL before Railway deploy.
#   2. Railway startCommand always runs migrations on startup (idempotent).

name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    # Optional: skip silently if PROD_DATABASE_URL secret is not configured.
    # Railway startCommand always runs migrations on startup, so this is best-effort only.
    continue-on-error: true
    env:
      PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if PROD_DATABASE_URL is configured
        id: check_db
        run: |
          if [ -z "$PROD_DATABASE_URL" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️  PROD_DATABASE_URL not set — skipping pre-deploy migration (Railway startCommand handles it on startup)"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: pnpm/action-setup@v4
        if: steps.check_db.outputs.skip == 'false'

      - uses: actions/setup-node@v4
        if: steps.check_db.outputs.skip == 'false'
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.check_db.outputs.skip == 'false'
        run: pnpm install --frozen-lockfile

      - name: Build server (required for data-source.js)
        if: steps.check_db.outputs.skip == 'false'
        run: pnpm --filter server build

      - name: Run TypeORM migrations
        if: steps.check_db.outputs.skip == 'false'
        working-directory: server
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          NODE_ENV: production
        run: node node_modules/typeorm/cli.js migration:run -d dist/database/data-source.js

  notify:
    name: Notify Discord
    needs: [migrate]
    runs-on: ubuntu-latest
    if: always()
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_DEPLOY }}
    steps:
      - name: Notify deploy triggered (success)
        if: env.DISCORD_WEBHOOK != '' && needs.migrate.result != 'failure'
        env:
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          REF_NAME: ${{ github.ref_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
          curl -s -H "Content-Type: application/json" -X POST "$DISCORD_WEBHOOK" \
            -d "{
              \"embeds\": [{
                \"title\": \"🚀 배포 트리거 — OddsCast\",
                \"description\": \"master 푸시 완료. Railway가 자동 배포를 시작합니다.\",
                \"color\": 3066993,
                \"fields\": [
                  {\"name\": \"Branch\", \"value\": \"\`$REF_NAME\`\", \"inline\": true},
                  {\"name\": \"Commit\", \"value\": \"\`$SHORT_SHA\`\", \"inline\": true},
                  {\"name\": \"By\", \"value\": \"$ACTOR\", \"inline\": true},
                  {\"name\": \"Message\", \"value\": \"$FIRST_LINE\", \"inline\": false}
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"

      - name: Notify migration failure
        if: env.DISCORD_WEBHOOK != '' && needs.migrate.result == 'failure'
        env:
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          REF_NAME: ${{ github.ref_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
          REPO="${{ github.repository }}"
          RUN_ID="${{ github.run_id }}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          curl -s -H "Content-Type: application/json" -X POST "$DISCORD_WEBHOOK" \
            -d "{
              \"embeds\": [{
                \"title\": \"⚠️ DB 마이그레이션 실패 — OddsCast\",
                \"description\": \"마이그레이션이 실패했지만 Railway 배포는 진행됩니다 (continue-on-error).\",
                \"color\": 15105570,
                \"fields\": [
                  {\"name\": \"Branch\", \"value\": \"\`$REF_NAME\`\", \"inline\": true},
                  {\"name\": \"Commit\", \"value\": \"\`$SHORT_SHA\`\", \"inline\": true},
                  {\"name\": \"By\", \"value\": \"$ACTOR\", \"inline\": true},
                  {\"name\": \"Message\", \"value\": \"$FIRST_LINE\", \"inline\": false},
                  {\"name\": \"Logs\", \"value\": \"[GitHub Actions 로그 보기](${RUN_URL})\", \"inline\": false}
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"
