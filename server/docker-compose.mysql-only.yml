services:
  # MySQL 데이터베이스만 실행
  mysql:
    image: mysql:8.0
    container_name: goldenrace-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-goldenrace}
      MYSQL_USER: ${MYSQL_USER:-goldenrace_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-goldenrace_password}
    ports:
      - '${MYSQL_PORT:-3307}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --init-connect='SET NAMES utf8mb4' --skip-character-set-client-handshake --sql-mode="STRICT_TRANS_TABLES,NO_ZERO_DATE,NO_ZERO_IN_DATE,ERROR_FOR_DIVISION_BY_ZERO"
    networks:
      - goldenrace-network
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          'localhost',
          '-u',
          'root',
          '-p${MYSQL_ROOT_PASSWORD:-rootpassword}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  mysql_data:
    driver: local

networks:
  goldenrace-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
