# Deploy to Railway on push to master.
# Requires repo secrets: RAILWAY_TOKEN.
# Optional: PROD_DATABASE_URL — if set, runs TypeORM migrations before deploy.
# See: docs/RAILWAY_DEPLOYMENT.md, docs/TODO_CONTINUE.md
#
# Migration strategy:
#   1. (Optional) GitHub Actions runs migrations via PROD_DATABASE_URL before Railway deploy.
#   2. Dockerfile CMD always runs migrations on startup (typeorm migration:run is idempotent).
# This dual approach ensures migrations run even on Railway restarts without a new push.

name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    # Skip silently if PROD_DATABASE_URL secret is not configured
    env:
      PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if PROD_DATABASE_URL is configured
        id: check_db
        run: |
          if [ -z "$PROD_DATABASE_URL" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️  PROD_DATABASE_URL not set — skipping pre-deploy migration (Dockerfile CMD will handle it on startup)"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: pnpm/action-setup@v4
        if: steps.check_db.outputs.skip == 'false'
        with:
          version: latest

      - uses: actions/setup-node@v4
        if: steps.check_db.outputs.skip == 'false'
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.check_db.outputs.skip == 'false'
        run: pnpm install --frozen-lockfile

      - name: Build server (required for data-source.js)
        if: steps.check_db.outputs.skip == 'false'
        run: pnpm --filter server build

      - name: Run TypeORM migrations
        if: steps.check_db.outputs.skip == 'false'
        working-directory: server
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          NODE_ENV: production
        run: node node_modules/typeorm/cli.js migration:run -d dist/database/data-source.js

  deploy:
    name: Deploy to Railway
    needs: migrate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy server to Railway
        run: railway up --service server
        continue-on-error: true

  notify:
    name: Notify Discord
    needs: [migrate, deploy]
    runs-on: ubuntu-latest
    if: always() && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Notify success
        if: needs.deploy.result == 'success'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_DEPLOY }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          REF_NAME: ${{ github.ref_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
          curl -s -H "Content-Type: application/json" -X POST "$DISCORD_WEBHOOK" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ 배포 완료 — OddsCast\",
                \"description\": \"Railway 서버 배포가 완료되었습니다.\\nVercel(webapp/admin)은 자동 배포 중입니다.\",
                \"color\": 3066993,
                \"fields\": [
                  {\"name\": \"Branch\", \"value\": \"\`$REF_NAME\`\", \"inline\": true},
                  {\"name\": \"Commit\", \"value\": \"\`$SHORT_SHA\`\", \"inline\": true},
                  {\"name\": \"By\", \"value\": \"$ACTOR\", \"inline\": true},
                  {\"name\": \"Message\", \"value\": \"$FIRST_LINE\", \"inline\": false}
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"

      - name: Notify failure
        if: needs.deploy.result == 'failure' || needs.migrate.result == 'failure'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_DEPLOY }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          REF_NAME: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FAILED_JOB: ${{ needs.migrate.result == 'failure' && 'migrate' || 'deploy' }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          curl -s -H "Content-Type: application/json" -X POST "$DISCORD_WEBHOOK" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ 배포 실패 — OddsCast\",
                \"description\": \"**$FAILED_JOB** 단계에서 실패했습니다.\",
                \"color\": 15158332,
                \"fields\": [
                  {\"name\": \"Branch\", \"value\": \"\`$REF_NAME\`\", \"inline\": true},
                  {\"name\": \"Commit\", \"value\": \"\`$SHORT_SHA\`\", \"inline\": true},
                  {\"name\": \"By\", \"value\": \"$ACTOR\", \"inline\": true},
                  {\"name\": \"로그 확인\", \"value\": \"[Actions 열기]($RUN_URL)\", \"inline\": false}
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"
