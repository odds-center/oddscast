version: '3.8'

services:
  # MySQL 데이터베이스
  mysql:
    image: mysql:8.0
    container_name: goldenrace-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: goldenrace_dev
      MYSQL_USER: goldenrace_user
      MYSQL_PASSWORD: goldenrace_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - goldenrace-dev-network

  # phpMyAdmin (개발용)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: goldenrace-phpmyadmin-dev
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    ports:
      - '8080:80'
    depends_on:
      - mysql
    networks:
      - goldenrace-dev-network

  # NestJS 애플리케이션 (개발용)
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: goldenrace-app-dev
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      NODE_ENV: development
      PORT: 3002
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: goldenrace_user
      DB_PASSWORD: goldenrace_password
      DB_DATABASE: goldenrace_dev
      KRA_API_KEY: yyRDa%2FaXc9SsDdY67IqkdXJmZgZXOzsKqnf%2BR%2FSZjR6iAxYLzKiq%2BgXTmdUj%2FFe%2BFtEsMXnMYrLaiX6PZ%2FemsQ%3D%3D
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./nest-cli.json:/app/nest-cli.json
    depends_on:
      - mysql
    networks:
      - goldenrace-dev-network
    command: npm run start:dev

volumes:
  mysql_dev_data:

networks:
  goldenrace-dev-network:
    driver: bridge
