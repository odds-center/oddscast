services:
  # MySQL 데이터베이스
  mysql:
    image: mysql:8.0
    container_name: goldenrace-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-goldenrace}
      MYSQL_USER: ${MYSQL_USER:-goldenrace_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-goldenrace_password}
    ports:
      - '${MYSQL_PORT:-3307}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --sql-mode="STRICT_TRANS_TABLES,NO_ZERO_DATE,NO_ZERO_IN_DATE,ERROR_FOR_DIVISION_BY_ZERO"
    networks:
      - goldenrace-network
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          'localhost',
          '-u',
          'root',
          '-p${MYSQL_ROOT_PASSWORD:-rootpassword}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # NestJS 애플리케이션
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-development}
    container_name: goldenrace-app
    restart: unless-stopped
    ports:
      - '${APP_PORT:-3002}:3002'
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3002}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${DB_USERNAME:-goldenrace_user}
      DB_PASSWORD: ${DB_PASSWORD:-goldenrace_password}
      DB_DATABASE: ${DB_DATABASE:-goldenrace}
      KRA_API_KEY: ${KRA_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-goldenrace-super-secret-jwt-key-2024-production-ready}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-90d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3002/api/auth/google/callback}
      OAUTH_PKCE_ENABLED: ${OAUTH_PKCE_ENABLED:-true}
      OAUTH_STATE_ENABLED: ${OAUTH_STATE_ENABLED:-true}
      OAUTH_TOKEN_EXPIRE_TIME: ${OAUTH_TOKEN_EXPIRE_TIME:-300000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,exp://localhost:19000}
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./nest-cli.json:/app/nest-cli.json
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - goldenrace-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3002/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

volumes:
  mysql_data:
    driver: local

networks:
  goldenrace-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
