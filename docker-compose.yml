# OddsCast — 로컬 개발용 (PostgreSQL, Redis, n8n 선택)
# 사용: docker compose up -d
# PostgreSQL: localhost:5432, DB=oddscast, 스키마=oddscast → DATABASE_URL=postgresql://oddscast:oddscast@localhost:5432/oddscast?schema=oddscast
# Redis: localhost:6379 → REDIS_URL=redis://localhost:6379
# n8n: http://localhost:5678

services:
  postgres:
    image: postgres:16-alpine
    container_name: oddscast-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: oddscast
      POSTGRES_PASSWORD: oddscast
      POSTGRES_DB: oddscast
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/scripts/docker-init-oddscast.sql:/docker-entrypoint-initdb.d/01-oddscast-schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U oddscast -d oddscast']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: goldenrace-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: goldenrace-n8n
    ports:
      - '5678:5678'
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=changeme
      - N8N_HOST=localhost
      - N8N_PORT=5678
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  postgres_data: {}
  redis_data: {}
  n8n_data: {}
