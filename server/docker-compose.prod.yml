version: '3.8'

services:
  # MySQL 데이터베이스 (프로덕션용)
  mysql:
    image: mysql:8.0
    container_name: goldenrace-mysql-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-goldenrace_prod}
      MYSQL_USER: ${MYSQL_USER:-goldenrace_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-goldenrace_password}
    ports:
      - '3306:3306'
    volumes:
      - mysql_prod_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - goldenrace-prod-network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 20s
      retries: 10

  # NestJS 애플리케이션 (프로덕션용)
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: goldenrace-app-prod
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      NODE_ENV: production
      PORT: 3002
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${DB_USERNAME:-goldenrace_user}
      DB_PASSWORD: ${DB_PASSWORD:-goldenrace_password}
      DB_DATABASE: ${DB_DATABASE:-goldenrace_prod}
      KRA_API_KEY: ${KRA_API_KEY:-yyRDa%2FaXc9SsDdY67IqkdXJmZgZXOzsKqnf%2BR%2FSZjR6iAxYLzKiq%2BgXTmdUj%2FFe%2BFtEsMXnMYrLaiX6PZ%2FemsQ%3D%3D}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - goldenrace-prod-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3002/api/health']
      timeout: 10s
      retries: 5
      start_period: 30s

  # Nginx 리버스 프록시 (프로덕션용)
  nginx:
    image: nginx:alpine
    container_name: goldenrace-nginx-prod
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - goldenrace-prod-network

volumes:
  mysql_prod_data:

networks:
  goldenrace-prod-network:
    driver: bridge
