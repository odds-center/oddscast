name: Train Prediction Model

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to commit model.pkl to'
        required: false
        default: 'master'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  train:
    name: Train and commit model.pkl
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'master' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: server/scripts/requirements.txt

      - name: Install dependencies
        run: pip install lightgbm xgboost psycopg2-binary scikit-learn numpy

      - name: Train model
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          python3 server/scripts/train_model.py \
            --dsn "$DATABASE_URL" \
            --out server/scripts/model.pkl

      - name: Commit model.pkl
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server/scripts/model.pkl
          if git diff --cached --quiet; then
            echo "Model unchanged — nothing to commit."
          else
            git commit -m "chore: update trained prediction model (LightGBM/XGBoost) [skip ci]"
            git push
          fi
