version: '3.8'

services:
  # MySQL 데이터베이스
  mysql:
    image: mysql:8.0
    container_name: goldenrace-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: goldenrace
      MYSQL_USER: goldenrace_user
      MYSQL_PASSWORD: goldenrace_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - goldenrace-dev-network

  # NestJS 애플리케이션 (개발용)
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: goldenrace-app-dev
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      NODE_ENV: development
      PORT: 3002
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: goldenrace_user
      DB_PASSWORD: goldenrace_password
      DB_DATABASE: goldenrace
      KRA_API_KEY: yyRDa%2FaXc9SsDdY67IqkdXJmZgZXOzsKqnf%2BR%2FSZjR6iAXYLzKiq%2BgXTmdUj%2FFe%2BFtEsMXnMYrLaiX6PZ%2FemsQ%3D%3D
      JWT_SECRET: goldenrace-super-secret-jwt-key-2024-production-ready
      JWT_EXPIRES_IN: 30d
      JWT_REFRESH_EXPIRES_IN: 90d
      GOOGLE_CLIENT_ID: 297222267377-husiseemja8abddjujt78g5bhlnne2do.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: GOCSPX-your-google-client-secret-here
      GOOGLE_CALLBACK_URL: http://localhost:3002/api/auth/google/callback
      OAUTH_PKCE_ENABLED: true
      OAUTH_STATE_ENABLED: true
      OAUTH_TOKEN_EXPIRE_TIME: 300000
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,exp://localhost:19000,exp://192.168.1.100:19000,exp://10.0.2.2:19000
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./nest-cli.json:/app/nest-cli.json
    depends_on:
      - mysql
    networks:
      - goldenrace-dev-network
    command: npm run start:dev

volumes:
  mysql_dev_data:

networks:
  goldenrace-dev-network:
    driver: bridge
