name: Train LightGBM Model

on:
  workflow_dispatch:
    inputs:
      min_samples:
        description: 'Minimum training samples required (default: 100)'
        required: false
        default: '100'

jobs:
  train:
    name: Train and commit model.pkl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: server/scripts/requirements.txt

      - name: Install dependencies
        run: pip install lightgbm psycopg2-binary scikit-learn numpy

      - name: Train model
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          python3 server/scripts/train_model.py \
            --dsn "$DATABASE_URL" \
            --out server/scripts/model.pkl

      - name: Commit model.pkl
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server/scripts/model.pkl
          if git diff --cached --quiet; then
            echo "No model changes."
          else
            git commit -m "chore: update trained LightGBM model [skip ci]"
            git push
          fi
